<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linhas - Recife Hub</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow-y: auto;
            background-color: #f8fafc;
            padding-bottom: 90px;
        }
        
        .pg-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .pg-header h1 {
            font-size: 1.5rem;
            color: #0f172a;
            font-weight: 800;
            margin: 0;
        }

        .pg-header i {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .linhas-container {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .linha-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
        }
        
        .linha-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .linha-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }
        
        .linha-numero {
            font-size: 1.25rem;
            font-weight: 800;
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 10px;
            letter-spacing: 0.05em;
        }
        
        .linha-nome {
            font-size: 1.15rem;
            font-weight: 700;
            flex: 1;
            line-height: 1.2;
        }
        
        .linha-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }
        
        .linha-stat {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #475569;
        }
        
        .linha-stat i {
            color: #94a3b8;
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .linha-stat span {
            font-weight: 600;
            color: #1e293b;
        }
        
        .linha-badges {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .linha-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            background: #f1f5f9;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .linha-badge.active {
            background: #dcfce7;
            color: #166534;
        }
        
        .linha-btn {
            margin: 10px 20px 20px;
            padding: 14px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .linha-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        
        .bottom-nav-btn {
            color: #94a3b8;
        }
        
        .linhas-nav-btn {
            color: var(--primary);
            background: rgba(79, 70, 229, 0.12);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }
    </style>
</head>
<body>

    <header class="pg-header">
        <i class="fa-solid fa-bus"></i>
        <h1>Linhas Disponíveis</h1>
    </header>

    <main class="linhas-container" id="linhasContainer">
        <!-- Loader inicial -->
        <div style="text-align: center; width: 100%; grid-column: 1 / -1; padding: 60px; color: #64748b;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2.5rem; margin-bottom: 20px; color: var(--primary);"></i>
            <p style="font-size: 1.1rem; font-weight: 500;">Carregando as linhas do Recife...</p>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-btn home-nav-btn" id="navHome" title="Home" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-house"></i>
        </button>
        <button class="bottom-nav-btn linhas-nav-btn" id="navLinhas" title="Linhas">
            <i class="fa-solid fa-route"></i>
        </button>
    </div>

    <script src="js/linhas.js"></script>
</body>
</html>
