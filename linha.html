<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recife Hub - Ônibus no Recife Antigo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/linhas.css">
</head>
<body>
    <!-- tela informações linha onibus -->
        <main>
            <section id="bus_name_container">
                <div class="bus_name">
                    <div class="color"></div>
                    <p>117 - TI Recife (PCR/Cabugá) (Circular)</p>
                    <i class="fa-regular fa-star"></i>
                </div>
            </section>
            <section id="schedules_container">
                <div class="header_schedule">
                    <p>Horários</p>
                    <p class="more_schedules">Ver mais</p>
                </div>
                <div class="schedules">
                    <div class="schedule">6:00</div>
                    <div class="schedule">6:00</div>
                    <div class="schedule">6:00</div>
                    <div class="schedule">6:00</div>
                    <div class="schedule">6:00</div>
                    <div class="schedule">6:00</div>
                </div>
            </section>
            <section id="main_infos_container">
                <section id="price_container">
                    <p>Valor da passagem</p>
                    <p class="price">R$ 4,50</p>
                </section>
                <section id="terminal_container">
                    <p>Terminal</p>
                    <div class="name_terminal_container">
                        <p class="name_terminal">TI Recife</p>
                        <i class="fa-solid fa-circle-info"></i>
                    </div>
                </section>
                <section id="top_stops_container">
                    <p>Paradas em destaque</p>
                    <div class="top_stops">
                        <div class="stop">
                            <img src="#" alt="Imagem da/do lugar proximo dessa parada">
                            <p>Nome do lugar</p>
                        </div>
                        <div class="stop">
                            <img src="#" alt="Imagem da/do lugar proximo dessa parada">
                            <p>Nome do lugar</p>
                        </div>
                        <div class="stop">
                            <img src="#" alt="Imagem da/do lugar proximo dessa parada">
                            <p>Nome do lugar</p>
                        </div>
                        <div class="stop">
                            <img src="#" alt="Imagem da/do lugar proximo dessa parada">
                            <p>Nome do lugar</p>
                        </div>
                    </div>
                </section>
                <section id="other_info_container">
                    <div class="integration"></div>
                    <div class="bonus">
                        <div class="acessibility">
                            <i class="fa-brands fa-accessible-icon"></i>
                            <p>Acessibilidade</p>
                        </div>
                    </div>
                </section>
            </section>
            <section id="galery_container">
                <div class="galery">
                    <img src="#" alt="Imagem do onibus">
                    <img src="#" alt="Imagem do onibus">
                </div>
            </section>

        </main>
</body>
<script src="js/linhas.js"></script>
<script src="js/script.js"></script>
</html>
