<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recife Hub - Ônibus no Recife Antigo</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Glass Navbar -->
    <nav class="glass-navbar">
        <div class="nav-brand">
            <div class="brand-icon">
                <i class="fa-solid fa-bus-simple"></i>
            </div>
            <span class="brand-text">Recife Hub</span>
        </div>

        <div class="nav-center">
            <div class="search-container">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Buscar rota de ônibus..."
                    autocomplete="off"><!-- pesquisar linhas -->
                <i class="fa-solid fa-times clear-search" id="clearSearchBtn" style="display: none;"></i>

                <div class="search-dropdown" id="searchDropdown">
                    <div class="dropdown-header" id="dropdownHeader">Rotas Recentes</div>
                    <ul class="dropdown-list" id="dropdownList">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <div class="nav-actions">
            <button class="icon-btn ai-nav-btn" id="toggleAiBtn" title="Assistente de IA">
                <i class="fa-solid fa-robot"></i>
            </button>
            <!-- Botão favoritos na navbar: abre modal já na aba Favoritos  -->
            <button class="icon-btn fav-nav-btn" id="favNavBtn" title="Meus Favoritos">
                <i class="fa-solid fa-star"></i>
            </button>
            <button class="icon-btn" id="profileBtn" title="Meu Perfil">
                <i class="fa-regular fa-circle-user"></i>
            </button>
            <button class="icon-btn mobile-menu-btn" id="mobileMenuBtn">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Main Map Area -->
    <main class="map-wrapper">
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <p>Carregando malha viária do Recife Antigo...</p>
        </div>

        <div id="map"></div>

        <div class="floating-controls">
            <button id="resetMapBtn" class="floating-btn" title="Mostrar todas as rotas">
                <i class="fa-solid fa-layer-group"></i> Visão Geral
            </button>
        </div>
    </main>

    <!-- AI Chat Assistant (Recife Hub AI) Left Aligned -->
    <div class="chat-assistant-container" id="chatAssistant">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">
                    <i class="fa-solid fa-robot"></i>
                    <span class="online-dot"></span>
                </div>
                <div>
                    <h3 class="chat-title">Recife Hub AI</h3>
                    <span class="chat-status">Responde em segundos</span>
                </div>
            </div>
            <button class="chat-close-btn" id="closeChatBtn" title="Fechar Lateral">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                <p>Olá! Sou o Recife Hub AI 🤖<br>Posso te ajudar a encontrar as melhores rotas de ônibus pelo Recife. Pra onde você quer ir?</p>
                <span class="message-time">Agora</span>
            </div>
        </div>

        <!-- Chat Input Area -->
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Pergunte sobre uma rota..." autocomplete="off">
            <button class="chat-send-btn" id="sendChatBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Profile Modal (Glassmorphism overlay) -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Meu Perfil</h2>
                <button class="close-btn" id="closeProfileBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="modal-body">
                <!-- Abas -->
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="profile">Perfil</button>
                    <button class="tab-btn" data-tab="favorites">Favoritos</button>
                    <button class="tab-btn" data-tab="history">Histórico</button>
                </div>

                <!-- Perfil -->
                <div class="tab-content active" id="profileTab">
                    <div class="user-info-section">
                        <div class="avatar-placeholder">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="info-inputs">
                            <label for="userName">Nome</label>
                            <input type="text" id="userName" placeholder="Como se chama?">
                            <button class="save-btn" id="saveProfileBtn">Salvar</button>
                        </div>
                    </div>
                </div>

                <!--Favoritos -->
                <div class="tab-content" id="favoritesTab">
                    <ul class="favorites-list" id="favoritesList"></ul>
                </div>

                <!-- Histórico -->
                <div class="tab-content" id="historyTab">
                    <div class="history-section">
                        <div class="history-header">
                            <h3><i class="fa-solid fa-clock-rotate-left"></i> Histórico</h3>
                            <button class="text-btn danger" id="clearHistoryBtn">Limpar</button>
                        </div>
                        <ul class="history-list" id="profileHistoryList"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar unificada: rotas de ônibus -->
    <div id="infoSidebar" class="info-sidebar">
        <button class="sidebar-close-btn" id="sidebarCloseBtn">
            <i class="fa-solid fa-times"></i>
        </button>
        <div class="sidebar-header">
            <div class="sidebar-icon"></div>
            <h2 class="sidebar-title"></h2>
        </div>
        <div class="sidebar-body">
        </div>
    </div>

    <!-- Painel lateral de informações da rota  -->
    <div id="routeInfoPanel" class="route-panel">
        <button id="closePanelBtn" class="close-panel-btn">
            <i class="fa-solid fa-times"></i>
        </button>
        <div class="panel-content" id="panelContent">
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-btn home-nav-btn" id="navHome" title="Home" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-house"></i>
        </button>
        <button class="bottom-nav-btn linhas-nav-btn" id="navLinhas" title="Linhas" onclick="window.location.href='linhas.html'">
            <i class="fa-solid fa-route"></i>
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- App JS -->
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
